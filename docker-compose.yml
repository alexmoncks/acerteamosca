services:
  db:
    image: postgres:16-alpine
    container_name: acerteamosca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: acerteamosca
      POSTGRES_PASSWORD: acerteamosca123
      POSTGRES_DB: acerteamosca
    ports:
      - "5433:5432"
    volumes:
      - acerteamosca_pgdata:/var/lib/postgresql/data

volumes:
  acerteamosca_pgdata:
