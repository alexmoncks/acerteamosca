# Railway configuration for the WebSocket unified server
# This config is used when deploying the WS service.
#
# Railway project setup:
#   Service 1 (Next.js app)  → Start command: npm start
#   Service 2 (WS server)    → Start command: node server/ws-unified.js
#
# ─────────────────────────────────────────────────
# Environment variables to set on the NEXT.JS service:
#
#   NEXT_PUBLIC_WS_URL          = wss://ws.acerteamosca.com.br/pong
#   NEXT_PUBLIC_WS_SHIPS_URL    = wss://ws.acerteamosca.com.br/ships
#   NEXT_PUBLIC_WS_MEMORY_URL   = wss://ws.acerteamosca.com.br/memory
#   NEXT_PUBLIC_WS_2048_URL     = wss://ws.acerteamosca.com.br/2048
#
# The WS service only needs PORT (auto-set by Railway).
# Domain ws.acerteamosca.com.br must point to this WS service.
# ─────────────────────────────────────────────────

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server/ws-unified.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
